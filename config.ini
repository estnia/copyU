[General]
; 数据库文件路径
database_path = clipboard_store.db

; 自动清理天数，超过此天数的记录将被删除
max_age_days = 3

; 自动清理间隔（小时）
cleanup_interval_hours = 1

; 单个记录最大大小（MB），超过此大小的记录将被忽略
max_record_size_mb = 1

; 保留的最大记录数（0表示无限制）
max_records = 1000

; 显示/隐藏剪贴板窗口的快捷键 (Ctrl+~)
hotkey_show = <ctrl>+grave

[UI]
; 窗口圆角半径（像素）
corner_radius = 8

; 窗口透明度（0.0-1.0）
window_opacity = 0.95

; 列表最大显示条目数
max_display_items = 50

; 窗口宽度（像素）
window_width = 400

; 窗口高度（像素）
window_height = 300

; 字体大小
font_size = 12

[display]
; 是否显示应用程序名称
show_app_name = true

; 日期时间格式
datetime_format = %m-%d %H:%M
